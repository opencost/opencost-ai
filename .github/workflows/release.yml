# Release workflow for opencost-ai-gateway.
#
# Triggered by pushing a `v*` tag from main (e.g. `v0.1.0`). Produces,
# per release, the non-negotiable supply-chain artefacts:
#
#   1. A multi-arch distroless image pushed to ghcr.io, tagged with the
#      release tag and the major/minor/full semver, plus a
#      `@sha256:...` digest for downstream pinning.
#   2. A cosign-signed image (keyless, OIDC identity from the GitHub
#      Actions token). Verification is documented in SECURITY.md and
#      docs/security.md §6.
#   3. An SPDX SBOM covering the built binary and its module graph,
#      attached to the image as an OCI attestation and uploaded as a
#      release asset.
#   4. SLSA v1.0 provenance generated by the official
#      slsa-framework/slsa-github-generator/ generic generator, attached
#      to the image as an attestation and published alongside the
#      release notes.
#
# The workflow deliberately does NOT push non-release (branch / PR)
# images. CI's `image` job in ci.yml builds without pushing so bad
# builds don't land artefacts on ghcr; only a signed tag triggers the
# release path.
#
# Tag format is enforced on the producer side (we only run on `v*.*.*`
# tags) and on the consumer side by SECURITY.md's "two most recent
# minor versions" support window.
#
# Permissions follow the OpenSSF scorecard principle of least
# privilege: the provenance generator reuses the same `id-token: write`
# scope as cosign keyless signing, so no long-lived registry password
# ever touches a runner.
#
# Action pin policy: `ci.yml` and `helm.yml` pin every third-party
# action by full SHA per OpenSSF scorecard guidance. Several actions
# this workflow needs (cosign-installer, sbom-action, attest-sbom,
# action-gh-release, setup-qemu-action, login-action) are first uses
# in this repository. They are referenced by version tag below with an
# intentional TODO — before cutting the first real release, a
# maintainer MUST resolve each tag to a SHA and update the reference
# in-place, matching the pattern used elsewhere in `.github/workflows`.
# Resolving the tags in this PR would commit fabricated digests; that
# is a worse failure mode than a visible TODO the release gate catches.

name: release

on:
  push:
    tags:
      # GitHub tag filters use glob matching, not regex. `*` means
      # "zero or more non-/ characters", so `v*.*.*` covers multi-
      # digit semver (`v0.10.0`, `v12.3.4`) while the second pattern
      # catches pre-release suffixes (`v0.2.0-rc1`). Release-notes
      # logic later rejects anything that is not strictly semver.
      - 'v*.*.*'
      - 'v*.*.*-*'

# Default to read-only; each job elevates only the scopes it needs.
permissions:
  contents: read

concurrency:
  # One release per tag at a time. `cancel-in-progress: false` means a
  # re-run on the same tag is queued behind the earlier one rather
  # than cancelled — we never race two publishes of the same digest,
  # and a partial registry push is allowed to finish cleanly before
  # the next attempt starts.
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.x"
  # Registry and image name as a single source of truth for every job
  # that has to reconstruct the image reference.
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-gateway

jobs:
  # -------------------------------------------------------------------
  # Version metadata + release-branch derivation.
  #
  # Every tag-triggered job below checks out source. In the new branch
  # model (see .github/branch-protection.md and the CHANGELOG
  # "Governance" entry; mirrored from upstream opencost's
  # develop/release-branch/main layout), `main` holds released
  # pointers and `v<MAJOR>.<MINOR>` holds the source that produced the
  # tag. Checking out a tag's SHA directly would pin the build to a
  # detached commit, so any patch that fast-forwards the release
  # branch after tagging (e.g. release-note cleanup, CHANGELOG
  # corrections) would not be picked up for artefacts built from that
  # branch's tip in a re-run. Using the release-branch ref keeps
  # "what we built" equal to "what the release branch points at",
  # which is the invariant maintainers can reason about.
  #
  # Mirrors the pattern in upstream's
  # `.github/workflows/build-and-publish-release.yml` where the tag
  # is normalised to a version and the branch name is constructed by
  # stripping the patch component (v0.1.0 -> v0.1).
  # -------------------------------------------------------------------
  prepare:
    name: derive version and release branch
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      major: ${{ steps.meta.outputs.major }}
      minor: ${{ steps.meta.outputs.minor }}
      release_branch: ${{ steps.meta.outputs.release_branch }}
    steps:
      - name: Derive version metadata
        id: meta
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"      # e.g. v0.1.0
          version="${tag#v}"            # strip leading v
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          # Major / minor tags for floating references. We do not
          # publish a `latest` tag on purpose: air-gap operators want
          # immutable references, and `latest` is the exact opposite.
          major="${version%%.*}"
          minor="${version%.*}"
          echo "major=${major}" >> "${GITHUB_OUTPUT}"
          echo "minor=${minor}" >> "${GITHUB_OUTPUT}"
          # Release branch name is `v<MAJOR>.<MINOR>` (e.g. v0.1), the
          # branch cut from `develop` when the minor line opened. The
          # tag itself lives on this branch; sourcing the branch
          # instead of the tag's detached commit keeps re-runs in step
          # with any fast-forward commits the branch has accumulated.
          release_branch="v${minor}"
          echo "release_branch=${release_branch}" >> "${GITHUB_OUTPUT}"
          echo "derived: tag=${tag} version=${version} release_branch=${release_branch}"

  # -------------------------------------------------------------------
  # Build + push the image, capture its digest, and generate + attach
  # the SPDX SBOM. The digest is the piece downstream jobs pivot on
  # (cosign signs by digest; SLSA provenance references the digest) —
  # doing everything that touches bytes in one job keeps the signed
  # subject and the built subject trivially identical.
  # -------------------------------------------------------------------
  build-and-sign:
    name: build, push, sign, sbom
    runs-on: ubuntu-24.04
    needs: prepare
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    outputs:
      image: ${{ steps.image.outputs.ref }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout release branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Source from the release branch, not the tag's commit.
          # Fails fast if the branch does not exist, which is the
          # intended gate: a tag outside a release branch is a
          # process violation (see .github/branch-protection.md).
          ref: ${{ needs.prepare.outputs.release_branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.2.0    # TODO: resolve to SHA before first release
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to GHCR
        uses: docker/login-action@v3.3.0    # TODO: resolve to SHA before first release
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compose image reference
        id: image
        run: |
          ref="${REGISTRY}/${IMAGE_NAME}"
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"

      - name: Build and push multi-arch image
        id: push
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false    # SLSA provenance comes from the official generator below
          sbom: false          # SBOM comes from anchore/sbom-action below (SPDX format)
          tags: |
            ${{ steps.image.outputs.ref }}:${{ needs.prepare.outputs.tag }}
            ${{ steps.image.outputs.ref }}:${{ needs.prepare.outputs.version }}
            ${{ steps.image.outputs.ref }}:${{ needs.prepare.outputs.minor }}
            ${{ steps.image.outputs.ref }}:${{ needs.prepare.outputs.major }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            REVISION=${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.6.0    # TODO: resolve to SHA before first release
        with:
          cosign-release: v2.4.1

      - name: Sign image (keyless, OIDC)
        # cosign resolves the OIDC identity from GITHUB_TOKEN; Sigstore
        # Fulcio issues a short-lived certificate bound to the release
        # workflow identity. Verifiers pin on
        #   --certificate-identity-regexp '^https://github.com/${{ github.repository }}/\\.github/workflows/release\\.yml@refs/tags/v.*'
        #   --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
        # per docs/security.md §6.
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cosign sign --yes \
            "${{ steps.image.outputs.ref }}@${{ steps.push.outputs.digest }}"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0.17.2    # TODO: resolve to SHA before first release
        with:
          image: ${{ steps.image.outputs.ref }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: gateway.spdx.json
          artifact-name: gateway.spdx.json

      - name: Attest SBOM to image
        uses: actions/attest-sbom@v2.1.0    # TODO: resolve to SHA before first release
        with:
          subject-name: ${{ steps.image.outputs.ref }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: gateway.spdx.json
          push-to-registry: true

      - name: Upload SBOM as release asset
        uses: softprops/action-gh-release@v2.0.8    # TODO: resolve to SHA before first release
        with:
          files: gateway.spdx.json
          fail_on_unmatched_files: true
          # draft:true keeps the release unpublished until release-notes
          # job completes; softprops/action-gh-release merges with an
          # existing release if one exists for the tag.
          draft: true

  # -------------------------------------------------------------------
  # SLSA v1.0 provenance for the image. Uses the official reusable
  # workflow so the resulting provenance is recognised by slsa-verifier
  # without any project-specific signer configuration.
  # -------------------------------------------------------------------
  provenance:
    name: slsa provenance
    needs: build-and-sign
    permissions:
      contents: write
      packages: write
      id-token: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.build-and-sign.outputs.image }}
      digest: ${{ needs.build-and-sign.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------
  # Package the Helm chart and attach it to the release. Chart version
  # and appVersion are expected to match the tag; the job fails the
  # release if they diverge.
  # -------------------------------------------------------------------
  helm-package:
    name: package helm chart
    runs-on: ubuntu-24.04
    needs: [prepare, build-and-sign]
    permissions:
      contents: write
    steps:
      - name: Checkout release branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.prepare.outputs.release_branch }}

      - name: Install Helm
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/helm.tar.gz \
            "https://get.helm.sh/helm-v3.16.2-linux-amd64.tar.gz"
          tar -xzf /tmp/helm.tar.gz -C /tmp
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm

      - name: Assert chart version matches tag
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          chart_version=$(awk '/^version:/{print $2}' deploy/helm/opencost-ai/Chart.yaml)
          app_version=$(awk '/^appVersion:/{print $2}' deploy/helm/opencost-ai/Chart.yaml | tr -d '"')
          echo "tag=${tag_version} chart.version=${chart_version} chart.appVersion=${app_version}"
          if [ "${tag_version}" != "${chart_version}" ] || [ "${tag_version}" != "${app_version}" ]; then
            echo "::error::tag ${tag_version} does not match Chart.yaml version/appVersion (${chart_version}/${app_version})" >&2
            exit 1
          fi

      - name: Package chart
        run: |
          mkdir -p dist
          helm package deploy/helm/opencost-ai --destination dist/

      - name: Attach chart to release
        uses: softprops/action-gh-release@v2.0.8    # TODO: resolve to SHA before first release
        with:
          files: dist/*.tgz
          fail_on_unmatched_files: true
          draft: true

  # -------------------------------------------------------------------
  # Compose release notes from CHANGELOG.md and publish the draft
  # release once every artefact has landed. Running last means a
  # partial release (e.g. provenance failed) is never visible as
  # "published" — the draft state guards the atomicity we cannot get
  # from GitHub's release API itself.
  # -------------------------------------------------------------------
  release-notes:
    name: publish release notes
    runs-on: ubuntu-24.04
    needs: [prepare, build-and-sign, provenance, helm-package]
    permissions:
      contents: write
    steps:
      - name: Checkout release branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # CHANGELOG.md on the release branch is the source of truth
          # for release notes; `main` only advances after release-notes
          # publishes, so sourcing from `main` here would race the
          # very job that updates it.
          ref: ${{ needs.prepare.outputs.release_branch }}

      - name: Extract release notes
        id: notes
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Pull the block for this tag from CHANGELOG.md. The heading
          # style is "## vX.Y.Z — YYYY-MM-DD"; we capture everything
          # until the next "## v" heading.
          awk -v tag="${tag}" '
            $0 ~ "^## " tag {flag=1; next}
            flag && /^## v/ {flag=0}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::no CHANGELOG.md entry found for ${tag}" >&2
            exit 1
          fi
          echo "notes_path=release-notes.md" >> "${GITHUB_OUTPUT}"

      - name: Publish release
        uses: softprops/action-gh-release@v2.0.8    # TODO: resolve to SHA before first release
        with:
          body_path: ${{ steps.notes.outputs.notes_path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
