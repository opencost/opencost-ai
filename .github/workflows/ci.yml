# CI for opencost-ai.
#
# Jobs are intentionally small and parallel so a failure points at one
# specific check (vet / test / staticcheck / govulncheck / image
# build). SHA-pinned actions per OpenSSF best practice; version
# comments are the human-readable tag.
#
# The image build job performs `docker build` only — no push — until a
# release workflow with cosign signing and SBOM generation lands. Do
# not add a registry login or push step here.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Pinning here instead of per-step so Go bumps happen in one place.
env:
  GO_VERSION: "1.22.12"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vet:
    name: go vet
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
      - name: Verify modules
        run: |
          go mod download
          go mod verify
      - name: go vet
        run: go vet ./...

  test:
    name: go test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
      - name: go test
        run: go test -race -count=1 ./...

  staticcheck:
    name: staticcheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
      # Installed at a pinned version; not committed to go.mod because
      # it is a CI-only lint tool, not an import of the module itself.
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.5.1
      - name: Run staticcheck
        run: staticcheck ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.3
      - name: Run govulncheck
        run: govulncheck ./...

  image:
    name: build distroless image (no push)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1
      - name: Build (no push)
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          tags: |
            opencost-ai-gateway:ci-${{ github.sha }}
          build-args: |
            VERSION=ci-${{ github.sha }}
            REVISION=${{ github.sha }}
