# Values used by the kind-based integration test job. Only the gateway
# renders; the bridge and Ollama are disabled because standing up a
# model runtime inside a GitHub-hosted kind cluster within the job
# budget is not feasible. The gateway's /v1/health endpoint does not
# touch the bridge, so this is enough to verify:
#
#   - the chart renders valid manifests
#   - the gateway image starts, passes liveness, and serves /v1/health
#   - the Service routes traffic end-to-end
#
# A future e2e job will wire in the full stack with a pre-pulled
# model cache.
#
# NetworkPolicy note: kind's default CNI (kindnet) does not enforce
# NetworkPolicy, so the policies render but are not exercised in this
# job. `kubectl port-forward` traffic is proxied through the apiserver
# rather than pod-to-pod, which is out of NetworkPolicy's scope
# entirely — the assertion below that /v1/health succeeds does not
# depend on the NP ingress configuration.
bridge:
  enabled: false
ollama:
  enabled: false
gateway:
  image:
    # Overridden by the workflow after `docker buildx ... --load` into
    # the kind cluster. Tag kept deterministic so the workflow can
    # compute it without querying the GHCR API.
    repository: opencost-ai-gateway
    tag: ci-integration
    pullPolicy: IfNotPresent
  auth:
    # Integration test only exercises the unauthenticated /v1/health
    # path, so no Secret is required. The Deployment mounts the token
    # volume as optional: true so a missing Secret does not block
    # startup.
    create: false
    existingSecret: ""
# NetworkPolicies are rendered so the template path is covered, but
# kindnet (kind's default CNI) ignores them — see the header note.
networkPolicy:
  enabled: true
