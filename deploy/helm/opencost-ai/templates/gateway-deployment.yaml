{{- if .Values.gateway.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencost-ai.gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opencost-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "opencost-ai.gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "opencost-ai.labels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
        {{- with .Values.gateway.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.gateway.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "opencost-ai.gateway.fullname" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.gateway.podSecurityContext | nindent 8 }}
      containers:
        - name: gateway
          image: {{ include "opencost-ai.image" (dict "image" .Values.gateway.image "defaultTag" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          # No args: the gateway binary takes all configuration from
          # environment variables (see docs/architecture.md §7.7).
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: OPENCOST_AI_LISTEN_ADDR
              value: ":8080"
            # Override the loopback default so the in-cluster
            # Prometheus / ServiceMonitor can scrape. A NetworkPolicy
            # ingress rule below scopes who may reach this port.
            - name: OPENCOST_AI_METRICS_LISTEN_ADDR
              value: ":9090"
            - name: OPENCOST_AI_BRIDGE_URL
              value: {{ include "opencost-ai.bridge.url" . | quote }}
            - name: OPENCOST_AI_DEFAULT_MODEL
              value: {{ .Values.gateway.config.defaultModel | quote }}
            - name: OPENCOST_AI_REQUEST_TIMEOUT
              value: {{ .Values.gateway.config.requestTimeout | quote }}
            - name: OPENCOST_AI_MAX_REQUEST_BYTES
              value: {{ .Values.gateway.config.maxRequestBytes | quote }}
            - name: OPENCOST_AI_RATE_LIMIT_PER_MIN
              value: {{ .Values.gateway.config.rateLimitPerMin | quote }}
            - name: OPENCOST_AI_AUDIT_LOG_QUERY
              value: {{ .Values.gateway.config.auditLogQuery | quote }}
            - name: OPENCOST_AI_AUTH_TOKEN_FILE
              value: "/var/run/secrets/opencost-ai/{{ .Values.gateway.auth.secretKey }}"
          securityContext:
            {{- toYaml .Values.gateway.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          volumeMounts:
            - name: auth-token
              mountPath: /var/run/secrets/opencost-ai
              readOnly: true
            - name: tmp
              mountPath: /tmp
          {{- with .Values.gateway.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.gateway.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: auth-token
          secret:
            secretName: {{ include "opencost-ai.gateway.authSecretName" . }}
            optional: true
            # 0400: owner-read only. Kubernetes projects Secret items
            # with mode 0644 by default, which is world-readable inside
            # the pod. 0400 narrows that to the single process that
            # runs as UID 65532, so anything that later co-tenants the
            # pod (sidecar, ephemeral debug container) cannot read the
            # token off the mount.
            defaultMode: 0400
            items:
              - key: {{ .Values.gateway.auth.secretKey }}
                path: {{ .Values.gateway.auth.secretKey }}
                mode: 0400
        # readOnlyRootFilesystem is enforced; /tmp is the one scratch
        # area the stdlib http server and audit logger may touch.
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
      {{- with .Values.gateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
