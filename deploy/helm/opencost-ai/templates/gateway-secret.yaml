{{- /*
The gateway loads its bearer token from a file mounted at
/var/run/secrets/opencost-ai/token. Per CLAUDE.md non-negotiables,
the chart NEVER ships a default token. This Secret is rendered only
when the operator opts in via gateway.auth.create=true AND supplies
gateway.auth.token at install time. The README documents the
openssl-one-liner we recommend.

When gateway.auth.existingSecret is set, this template renders nothing
and the Deployment mounts the pre-created Secret instead.
*/ -}}
{{- if and .Values.gateway.enabled .Values.gateway.auth.create (not .Values.gateway.auth.existingSecret) -}}
{{- if not .Values.gateway.auth.token -}}
{{- fail "gateway.auth.create=true requires gateway.auth.token to be set at install time; supply it via --set or an unchecked-in values file." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "opencost-ai.gateway.authSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opencost-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: Opaque
stringData:
  {{ .Values.gateway.auth.secretKey }}: {{ .Values.gateway.auth.token | quote }}
{{- end }}
