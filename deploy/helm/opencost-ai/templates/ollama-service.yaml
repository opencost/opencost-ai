{{- if .Values.ollama.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencost-ai.ollama.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opencost-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
  {{- with .Values.ollama.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.ollama.service.type }}
  selector:
    {{- include "opencost-ai.ollama.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ollama.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
