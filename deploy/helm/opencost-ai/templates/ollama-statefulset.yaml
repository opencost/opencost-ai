{{- if .Values.ollama.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "opencost-ai.ollama.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opencost-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  serviceName: {{ include "opencost-ai.ollama.fullname" . }}
  replicas: {{ .Values.ollama.replicaCount }}
  selector:
    matchLabels:
      {{- include "opencost-ai.ollama.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "opencost-ai.labels" . | nindent 8 }}
        app.kubernetes.io/component: ollama
        {{- with .Values.ollama.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.ollama.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.ollama.podSecurityContext | nindent 8 }}
      containers:
        - name: ollama
          image: {{ include "opencost-ai.image" (dict "image" .Values.ollama.image "defaultTag" "latest") }}
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            # Bind all interfaces so the bridge can reach Ollama; the
            # NetworkPolicy keeps anyone else out. HOME is relocated
            # into the PVC mount so Ollama's default ~/.ollama cache
            # path works under runAsUser=65532 with a read-only root.
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: HOME
              value: /var/lib/ollama
          securityContext:
            {{- toYaml .Values.ollama.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          volumeMounts:
            - name: models
              # Ollama writes GGUFs and manifests under $HOME/.ollama.
              mountPath: /var/lib/ollama
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
        {{- if not .Values.ollama.persistence.enabled }}
        - name: models
          emptyDir: {}
        {{- end }}
      {{- with .Values.ollama.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ollama.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ollama.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.ollama.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: models
        labels:
          {{- include "opencost-ai.labels" . | nindent 10 }}
          app.kubernetes.io/component: ollama
      spec:
        accessModes:
          {{- toYaml .Values.ollama.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.ollama.persistence.size }}
        {{- with .Values.ollama.persistence.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
  {{- end }}
{{- end }}
