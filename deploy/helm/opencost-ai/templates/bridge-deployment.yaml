{{- if .Values.bridge.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencost-ai.bridge.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opencost-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: bridge
spec:
  replicas: {{ .Values.bridge.replicaCount }}
  selector:
    matchLabels:
      {{- include "opencost-ai.bridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "opencost-ai.labels" . | nindent 8 }}
        app.kubernetes.io/component: bridge
        {{- with .Values.bridge.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Force pod restart when servers.json changes, so operators
        # don't have to remember to `kubectl rollout restart` after
        # editing bridge.opencostMcp.*.
        checksum/servers: {{ include (print $.Template.BasePath "/bridge-configmap.yaml") . | sha256sum }}
        {{- with .Values.bridge.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.bridge.podSecurityContext | nindent 8 }}
      containers:
        - name: bridge
          image: {{ include "opencost-ai.image" (dict "image" .Values.bridge.image "defaultTag" "latest") }}
          imagePullPolicy: {{ .Values.bridge.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: {{ include "opencost-ai.ollama.url" . | quote }}
            - name: MCP_CONFIG_PATH
              value: /etc/ollama-mcp-bridge/servers.json
          securityContext:
            {{- toYaml .Values.bridge.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.bridge.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/ollama-mcp-bridge
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: {{ include "opencost-ai.bridge.fullname" . }}
        - name: tmp
          emptyDir:
            sizeLimit: 32Mi
      {{- with .Values.bridge.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bridge.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bridge.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
